services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    pull_policy: always
    ports:
      - "8888:8888"  # API
      - "9999:9999"  # Web UI
    environment:
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY}
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    restart: unless-stopped

volumes:
  hindsight-data:
